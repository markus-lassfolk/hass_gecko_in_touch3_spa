name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install ruff
        run: pip install -r requirements_test.txt
      - name: Ruff check
        run: ruff check custom_components/gecko tests
      - name: Ruff format
        run: ruff format --check custom_components/gecko tests

  pytest:
    name: Pytest (Home Assistant harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test harness (Home Assistant pins aiohttp; no gecko wheels here)
        run: pip install -r requirements_test.txt
      - name: Install awsiotsdk (includes awscrt native wheel)
        run: pip install awsiotsdk==1.26.0
      - name: Install gecko-iot-client without dependency resolution
        run: pip install --no-deps gecko-iot-client==0.2.5
      - name: Pytest
        run: pytest tests/ -v --tb=short

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
