name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install ruff
        run: pip install -r requirements_test.txt
      - name: Ruff check
        run: ruff check custom_components/gecko tests
      - name: Ruff format
        run: ruff format --check custom_components/gecko tests

  pytest:
    name: Pytest (Home Assistant harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test harness (Home Assistant pins aiohttp; no gecko wheels here)
        run: pip install -r requirements_test.txt
      - name: Install awsiotsdk (includes awscrt native wheel)
        run: pip install awsiotsdk==1.26.0
      - name: Install gecko-iot-client without dependency resolution
        run: pip install --no-deps gecko-iot-client==0.2.5
      - name: Pytest
        run: pytest tests/ -v --tb=short

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  # When all checks pass on main after a push, publish a GitHub Release for
  # ``custom_components/gecko/manifest.json`` ``version`` if ``v<version>`` is not
  # already a tag (idempotent; safe for docs-only pushes that keep the same version).
  release:
    name: GitHub Release (manifest tag)
    runs-on: ubuntu-latest
    needs: [lint, pytest, hassfest, hacs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: manifest
        run: |
          VERSION=$(jq -r .version custom_components/gecko/manifest.json)
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "::error::Invalid or missing version in manifest.json"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Create release if tag is new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.manifest.outputs.tag }}"
          VER="${{ steps.manifest.outputs.version }}"
          git fetch origin --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; nothing to publish."
            exit 0
          fi
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "Gecko ${VER}" \
            --generate-notes
